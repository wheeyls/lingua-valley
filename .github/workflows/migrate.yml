name: Database Migrations

# Apply Supabase migrations automatically. Runs on push to main when migration
# files change, and can be triggered manually from the Actions tab.
on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - "supabase/config.toml"
      - ".github/workflows/migrate.yml"
  workflow_dispatch: {}

# Avoid two migration runs racing against the same database.
concurrency:
  group: db-migrations
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verify required secrets
        run: |
          missing=0
          for v in SUPABASE_ACCESS_TOKEN SUPABASE_DB_PASSWORD SUPABASE_PROJECT_REF; do
            if [ -z "${!v}" ]; then echo "::error::Missing secret $v"; missing=1; fi
          done
          [ "$missing" = "0" ] || exit 1

      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Show pending migrations
        run: supabase migration list || true

      - name: Apply migrations
        run: supabase db push
