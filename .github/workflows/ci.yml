name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Typecheck (src)
        run: npx tsc --noEmit
      - name: Typecheck (api)
        run: npx tsc --noEmit -p api/tsconfig.json
      - name: Tests
        run: npx vitest run
