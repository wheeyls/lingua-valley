<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Mobile-web: lock zoom, respect notches (safe areas), full-bleed. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#1a1423" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Lingua Valley" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>Lingua Valley — Learn Spanish by Living It</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        background: #1a1423;
        color: #f4ecd8;
        font-family: "Trebuchet MS", "Segoe UI", system-ui, sans-serif;
        overflow: hidden;
        /* Fill the REAL visible viewport on iOS Safari (dvh = dynamic viewport
           height, accounts for address bar / home indicator). Falls back to vh
           for older browsers. */
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        /* Disable text selection / callout / tap highlight for an app feel. */
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
        overscroll-behavior: none;
        touch-action: none;
      }
      #game {
        /* Fill the full visible area. NO safe-area padding, NO flex centering —
           Phaser's Scale.CENTER_BOTH handles centering within this container.
           Adding CSS padding/centering on top of Phaser's causes double-offset
           on iPhones. */
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        position: relative;
      }
      canvas {
        image-rendering: pixelated;
        /* The canvas itself stays interactive even though body blocks gestures. */
        touch-action: none;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
