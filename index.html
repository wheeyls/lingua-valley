<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#1a1423" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Lingua Valley" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>Lingua Valley — Learn Spanish by Living It</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      html, body {
        background: #1a1423;
        color: #f4ecd8;
        font-family: "Trebuchet MS", "Segoe UI", system-ui, sans-serif;
        /* dvh tracks iOS Safari's address bar appearing/disappearing */
        min-height: 100vh;
        min-height: 100dvh;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
        overscroll-behavior: none;
      }

      #game {
        width: 100%;
        min-height: 100vh;
        min-height: 100dvh;
        position: relative;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
