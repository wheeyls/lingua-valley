<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Mobile-web: lock zoom, respect notches (safe areas), full-bleed. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#1a1423" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Lingua Valley" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>Lingua Valley — Learn Spanish by Living It</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #1a1423;
        color: #f4ecd8;
        font-family: "Trebuchet MS", "Segoe UI", system-ui, sans-serif;
        overflow: hidden;
        /* Disable text selection / callout / tap highlight for an app feel. */
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
        overscroll-behavior: none;
        touch-action: none;
      }
      #game {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        /* Respect device safe areas (notches, home indicator). */
        padding: env(safe-area-inset-top) env(safe-area-inset-right)
          env(safe-area-inset-bottom) env(safe-area-inset-left);
        box-sizing: border-box;
      }
      canvas {
        image-rendering: pixelated;
        box-shadow: 0 0 40px rgba(0, 0, 0, 0.6);
        /* The canvas itself stays interactive even though body blocks gestures. */
        touch-action: none;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
